<body>

    <div class="container">
        <header class="app-header">
            <h1>GIF Studio</h1>
            <p class="subtitle">Discord の各上限に合わせた GIF / 動画 → GIF 最適化ツール</p>
        </header>

        <div class="preset-bar" role="group" aria-label="Discord 用途">
            <span class="preset-label">用途:</span>
            <div class="preset-chips" id="preset-chips">
                <button class="preset-chip" data-preset="emoji">
                    <span class="chip-name">絵文字</span>
                    <span class="chip-size">256KB</span>
                </button>
                <button class="preset-chip" data-preset="sticker">
                    <span class="chip-name">スタンプ</span>
                    <span class="chip-size">512KB</span>
                </button>
                <button class="preset-chip active" data-preset="icon">
                    <span class="chip-name">アイコン</span>
                    <span class="chip-size">8MB</span>
                </button>
                <button class="preset-chip" data-preset="chat">
                    <span class="chip-name">チャット</span>
                    <span class="chip-size">10MB</span>
                </button>
                <button class="preset-chip" data-preset="nitroBasic">
                    <span class="chip-name">Nitro Basic</span>
                    <span class="chip-size">50MB</span>
                </button>
                <button class="preset-chip" data-preset="nitro">
                    <span class="chip-name">Nitro</span>
                    <span class="chip-size">500MB</span>
                </button>
            </div>
        </div>

        <nav class="tabs" role="tablist">
            <button class="tab-btn active" data-tab="compress" role="tab" aria-selected="true">
                GIF圧縮
            </button>
            <button class="tab-btn" data-tab="video" role="tab" aria-selected="false">
                動画 → GIF
            </button>
        </nav>

        <section class="tab-panel active" id="tab-compress" role="tabpanel">
            <div class="drop-zone" id="gif-drop-zone">
                <label for="gif-upload" class="file-label">
                    <span class="file-text">GIFファイルを選択<small>または ここにドラッグ&ドロップ</small></span>
                    <input type="file" id="gif-upload" accept=".gif,image/gif" hidden>
                </label>
                <div id="gif-file-info" class="file-info"></div>
            </div>

            <div class="actions">
                <button id="compress-btn" class="btn primary" disabled>圧縮を開始</button>
            </div>

            <div id="gif-progress-container" class="progress-container" hidden>
                <p class="progress-label">
                    <span id="gif-progress-text">圧縮中…</span>
                    <span><span id="gif-progress-percent">0</span>%</span>
                </p>
                <progress id="gif-progress-bar" value="0" max="100"></progress>
            </div>

            <div id="gif-status" class="status-message" role="status" aria-live="polite"></div>

            <div id="gif-result" class="result-area" hidden>
                <div class="result-summary">
                    <div class="summary-item">
                        <p class="summary-label">元のサイズ</p>
                        <span id="gif-original-size" class="size-text"></span>
                    </div>
                    <div class="summary-item">
                        <p class="summary-label">圧縮後のサイズ</p>
                        <span id="gif-compressed-size" class="size-text success"></span>
                        <div class="usage-bar"><div id="gif-usage-fill" class="usage-bar-fill"></div></div>
                        <p class="usage-text" id="gif-usage-text"></p>
                    </div>
                </div>

                <div class="gif-comparison">
                    <figure class="gif-preview">
                        <figcaption>元のGIF</figcaption>
                        <img id="gif-original" alt="元のGIF" class="gif-image">
                    </figure>
                    <figure class="gif-preview">
                        <figcaption>圧縮後のGIF</figcaption>
                        <img id="gif-compressed" alt="圧縮後のGIF" class="gif-image">
                    </figure>
                </div>

                <a id="gif-download" class="btn primary download-btn" download="compressed.gif">
                    ダウンロード
                </a>
            </div>
        </section>

        <section class="tab-panel" id="tab-video" role="tabpanel" hidden>
            <div class="drop-zone" id="video-drop-zone">
                <label for="video-upload" class="file-label">
                    <span class="file-text">動画ファイルを選択<small>mp4, webm, mov などをドラッグ&ドロップ</small></span>
                    <input type="file" id="video-upload" accept="video/*" hidden>
                </label>
                <div id="video-file-info" class="file-info"></div>
            </div>

            <div id="video-editor" class="video-editor" hidden>
                <video id="video-preview" class="video-preview" controls playsinline muted></video>

                <div class="trim-controls">
                    <h3 class="section-title">トリミング</h3>

                    <div class="trim-row">
                        <label for="trim-start">開始 <span class="value"><span id="trim-start-display">0.00</span>s</span></label>
                        <input type="range" id="trim-start" min="0" max="0" step="0.05" value="0">
                    </div>

                    <div class="trim-row">
                        <label for="trim-end">終了 <span class="value"><span id="trim-end-display">0.00</span>s</span></label>
                        <input type="range" id="trim-end" min="0" max="0" step="0.05" value="0">
                    </div>

                    <p class="duration-info">
                        切り出し長: <strong id="trim-duration">0.00</strong> 秒
                    </p>
                </div>

                <div class="settings-grid">
                    <h3 class="section-title">変換設定</h3>

                    <div class="settings-row">
                        <div class="setting-item">
                            <label for="video-fps">FPS</label>
                            <select id="video-fps">
                                <option value="10">10</option>
                                <option value="15" selected>15</option>
                                <option value="20">20</option>
                                <option value="24">24</option>
                                <option value="30">30</option>
                            </select>
                        </div>

                        <div class="setting-item">
                            <label for="video-width">幅 (px)</label>
                            <input type="number" id="video-width" min="64" max="1920" step="2" value="720">
                        </div>

                        <div class="setting-item">
                            <label for="video-quality">品質 <small>(1=最高)</small></label>
                            <input type="number" id="video-quality" min="1" max="30" step="1" value="5">
                        </div>
                    </div>

                    <div class="setting-item checkbox">
                        <label>
                            <input type="checkbox" id="video-optimize" checked>
                            <span>上限ギリギリまで使う(超過時のみ自動で縮小)</span>
                        </label>
                    </div>

                    <div class="setting-item checkbox">
                        <label>
                            <input type="checkbox" id="video-dither" checked>
                            <span>ディザリング(色の階調が滑らかになる、推奨)</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="convert-btn" class="btn primary" disabled>GIFに変換</button>
            </div>

            <div id="video-progress-container" class="progress-container" hidden>
                <p class="progress-label">
                    <span id="video-progress-label">変換中…</span>
                    <span><span id="video-progress-percent">0</span>%</span>
                </p>
                <progress id="video-progress-bar" value="0" max="100"></progress>
            </div>

            <div id="video-status" class="status-message" role="status" aria-live="polite"></div>

            <div id="video-result" class="result-area" hidden>
                <div class="result-summary">
                    <div class="summary-item">
                        <p class="summary-label">GIFサイズ</p>
                        <span id="video-output-size" class="size-text success"></span>
                        <div class="usage-bar"><div id="video-usage-fill" class="usage-bar-fill"></div></div>
                        <p class="usage-text" id="video-usage-text"></p>
                    </div>
                    <div class="summary-item">
                        <p class="summary-label">解像度 / FPS</p>
                        <span id="video-output-info" class="size-text"></span>
                    </div>
                </div>

                <figure class="gif-preview single">
                    <figcaption>変換結果</figcaption>
                    <img id="video-output-gif" alt="変換されたGIF" class="gif-image">
                </figure>

                <a id="video-download" class="btn primary download-btn" download="converted.gif">
                    ダウンロード
                </a>
            </div>
        </section>

        <footer class="app-footer">
            <p>すべての処理はブラウザ内で実行されます · サーバーへのアップロードはありません</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/omggif@1.0.10/omggif.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
